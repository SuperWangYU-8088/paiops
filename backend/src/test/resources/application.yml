spring:
  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:mem:paiops_test;MODE=MySQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1
    username: sa
    password: 123456
  sql:
    init:
      mode: always
      schema-locations: classpath:schema-test.sql

paiops:
  schema-migration:
    enabled: false
  worker:
    outbox-scheduler-enabled: false
  security:
    master-key: test-master-key-for-spring-context

paiagent:
  default-username: ""
  default-password: ""

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
