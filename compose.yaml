name: paiops

services:
  mysql:
    image: ${DOCKER_HUB_MIRROR:-m.daocloud.io/docker.io}/library/mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-paiagent}
      TZ: Asia/Shanghai
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    volumes:
      - mysql_data:/var/lib/mysql
      - ./backend/src/main/resources/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 10s
      timeout: 5s
      retries: 20
    networks: [paiops]

  redis:
    image: ${DOCKER_HUB_MIRROR:-m.daocloud.io/docker.io}/library/redis:7.4-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--requirepass", "${REDIS_PASSWORD}"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$${REDIS_PASSWORD}\" ping | grep PONG"]
      interval: 10s
      timeout: 5s
      retries: 20
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    networks: [paiops]

  minio:
    image: ${DOCKER_HUB_MIRROR:-m.daocloud.io/docker.io}/minio/minio:RELEASE.2025-04-22T22-12-26Z
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 20
    networks: [paiops]

  backend:
    build:
      context: ./backend
      args:
        DOCKER_HUB_MIRROR: ${DOCKER_HUB_MIRROR:-m.daocloud.io/docker.io}
        MAVEN_MIRROR_URL: ${MAVEN_MIRROR_URL:-https://maven.aliyun.com/repository/public}
    restart: unless-stopped
    environment:
      SERVER_PORT: 8084
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_DATABASE: ${MYSQL_DATABASE:-paiagent}
      MYSQL_USERNAME: root
      MYSQL_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      MINIO_ENDPOINT: http://minio:9000
      MINIO_PUBLIC_URL: /storage
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      MINIO_BUCKET: paiops
      JWT_SECRET: ${JWT_SECRET}
      APP_AUTH_DEFAULT_USERNAME: ${APP_AUTH_DEFAULT_USERNAME:-admin}
      APP_AUTH_DEFAULT_PASSWORD: ${APP_AUTH_DEFAULT_PASSWORD}
      PAIOPS_MASTER_KEY: ${PAIOPS_MASTER_KEY}
      PAIOPS_ALERT_WEBHOOK_TOKEN: ${PAIOPS_ALERT_WEBHOOK_TOKEN}
      PAIOPS_WORKER_TOKEN: ${PAIOPS_WORKER_TOKEN}
      PAIOPS_HTTP_ALLOWED_HOSTS: ${PAIOPS_HTTP_ALLOWED_HOSTS:-prometheus,loki,kubernetes.default.svc,localhost,127.0.0.1}
      PAIOPS_WORKER_QUEUE: paiops:execution:queue
      TZ: Asia/Shanghai
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost:8084/api/system/health | grep '\"UP\"'"]
      interval: 15s
      timeout: 5s
      retries: 20
    networks: [paiops]

  worker:
    build:
      context: ./worker
      args:
        DOCKER_HUB_MIRROR: ${DOCKER_HUB_MIRROR:-m.daocloud.io/docker.io}
        GOPROXY: ${GOPROXY:-https://goproxy.cn,direct}
        ALPINE_MIRROR: ${ALPINE_MIRROR:-https://mirrors.aliyun.com/alpine}
    restart: unless-stopped
    environment:
      REDIS_ADDR: redis:6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      PAIOPS_API_URL: http://backend:8084
      PAIOPS_WORKER_TOKEN: ${PAIOPS_WORKER_TOKEN}
      PAIOPS_WORKER_QUEUE: paiops:execution:queue
      PAIOPS_WORKER_CONCURRENCY: ${PAIOPS_WORKER_CONCURRENCY:-2}
      PAIOPS_HEARTBEAT_INTERVAL: 10s
      PAIOPS_RECOVERY_INTERVAL: 30s
      PAIOPS_STALE_AFTER: 90s
      # 短租约配合 Go Worker 续租；进程崩溃后约 90 秒即可安全接管。
      PAIOPS_EXECUTION_LOCK_TTL: 90s
      PAIOPS_EXECUTION_LOCK_RENEW_INTERVAL: 30s
      TZ: Asia/Shanghai
    depends_on:
      backend:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks: [paiops]

  frontend:
    build:
      context: ./frontend
      args:
        DOCKER_HUB_MIRROR: ${DOCKER_HUB_MIRROR:-m.daocloud.io/docker.io}
        NPM_REGISTRY: ${NPM_REGISTRY:-https://registry.npmmirror.com}
    restart: unless-stopped
    ports:
      - "${PAIOPS_HTTP_PORT:-80}:80"
    depends_on:
      backend:
        condition: service_healthy
    networks: [paiops]

networks:
  paiops:
    driver: bridge

volumes:
  mysql_data:
  redis_data:
  minio_data:
